<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEANOOO - Linktree</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Space Grotesk', sans-serif;
    -webkit-tap-highlight-color: transparent; /* Menghilangkan warna biru saat tombol di-tap di HP */
}

body {
    background: #2D5BFF;
    /* Grid background khas Neobrutalism */
    background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 2px, transparent 2px);
    background-size: 40px 40px; /* Diperkecil agar grid lebih rapat dan estetik */
    padding: 20px 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 390px; /* Ukuran standar layout linktree mobile agar pas */
    margin: auto;
}

.card {
    background: #F5F5F5;
    border: 4px solid #111;
    border-radius: 24px;
    box-shadow: 8px 8px 0 #111;
    padding: 24px 16px;
    text-align: center;
    margin-bottom: 20px;
}

/* Container profil untuk mencegah icon rusak jika foto gagal load */
.profile-container {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid #111;
    background: #E0E0E0; /* Warna abu-abu sebagai cadangan jika foto hilang */
    margin: 0 auto 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.profile-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

h1 {
    font-size: 2.2rem;
    font-weight: 800;
    color: #111;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.tagline {
    font-size: 0.9rem;
    font-weight: 800;
    color: #2D5BFF;
    margin-bottom: 12px;
    letter-spacing: 1px;
}

.line {
    width: 80%;
    height: 4px;
    background: #111;
    margin: 0 auto 14px;
}

.desc {
    font-size: 0.9rem;
    line-height: 1.4;
    color: #111;
    font-weight: 700;
}

.link {
    display: block;
    text-decoration: none;
    text-align: center;
    background: #EEFF00;
    color: #111;
    font-size: 1.25rem;
    font-weight: 800;
    padding: 16px;
    margin-bottom: 16px;
    border: 4px solid #111;
    border-radius: 16px;
    box-shadow: 6px 6px 0 #111;
    position: relative;
    transition: all 0.1s ease;
}

/* Efek Neobrutalism saat tombol ditekan atau di-hover */
.link:hover, .link:active {
    transform: translate(3px, 3px);
    box-shadow: 3px 3px 0 #111;
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: white;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <div class="profile-container">
            <img src="lv_0_20260605163847.jpg" alt="DEANOOO">
        </div>
        
        <h1>DEANOOO</h1>
        
        <div class="tagline">PLAY • CREATE • WIN</div>
        
        <div class="line"></div>
        
        <div class="desc">Gaming Content • Community • Entertainment</div>
    </div>

    <a class="link" href="https://www.tiktok.com/@deaaanoo?_r=1&_t=ZS-96xIgVcq5ln" target="_blank">
        TikTok
    </a>

    <a class="link" href="https://youtube.com/@deaanooo?si=W_JEmHk3qRwxwDER" target="_blank">
        YouTube
    </a>

    <a class="link" href="https://www.facebook.com/share/1CcjwmUfjn/" target="_blank">
        Facebook
    </a>

    <a class="link" href="https://sociabuzz.com/deanooo/tribe" target="_blank">
        Sociabuzz Tribe
    </a>

    <a class="link" href="https://saweria.co/BLIICO" target="_blank">
        Saweria
    </a>

    <div class="footer">
        © DEANOOO
    </div>

</div>

</body>
</html>

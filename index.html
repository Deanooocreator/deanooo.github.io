<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>DEANOOO</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
background:#2d5bff;
background-image:
linear-gradient(rgba(255,255,255,.08) 2px, transparent 2px),
linear-gradient(90deg, rgba(255,255,255,.08) 2px, transparent 2px);
background-size:80px 80px;
padding:25px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#f5f5f5;
border:5px solid #111;
border-radius:35px;
box-shadow:12px 12px 0 #111;
padding:18px;
text-align:center;
margin-bottom:25px;
}

.profile{
width:100px;
height:100px;
border-radius:50%;
border:5px solid #111;
object-fit:cover;
display:block;
margin:0 auto 12px;
}

h1{
font-size:3rem;
font-weight:800;
color:#111;
margin:0;
}

.link{
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;

background:#EAFF00;
color:#111;

font-size:1.8rem;
font-weight:800;

border:5px solid #111;
border-radius:28px;

box-shadow:10px 10px 0 #111;

padding:22px;
margin-bottom:22px;

transition:
transform .25s ease,
box-shadow .25s ease,
background .25s ease;
}

.link:hover{
transform:translate(4px,4px);
box-shadow:6px 6px 0 #111;
}

.link:active{
transform:translate(8px,8px) scale(.98);
box-shadow:2px 2px 0 #111;
}

.footer{
margin-top:20px;
text-align:center;
font-size:.85rem;
font-weight:700;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="logo.png" class="profile">

<h1>DEANOOO</h1>

</div>

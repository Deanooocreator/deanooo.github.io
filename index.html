<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Space Grotesk',sans-serif;
}

body{
    background:#2d5bff;
    background-image:
    linear-gradient(rgba(255,255,255,.08) 2px, transparent 2px),
    linear-gradient(90deg, rgba(255,255,255,.08) 2px, transparent 2px);
    background-size:80px 80px;
    padding:30px 15px;
}

.container{
    max-width:430px;
    margin:auto;
}

.banner{
    width:100%;
    border-radius:20px;
    margin-bottom:25px;
}

.profile{
    background:#f5f5f5;
    border:5px solid #111;
    border-radius:30px;
    box-shadow:10px 10px 0 #111;
    padding:30px 20px;
    text-align:center;
    margin-bottom:25px;
}

.profile img{
    width:140px;
    height:140px;
    border-radius:50%;
    border:5px solid #111;
    object-fit:cover;
    display:block;
    margin:0 auto 20px;
}

h1{
    font-size:3rem;
    font-weight:800;
    color:#111;
}

.tagline{
    color:#2d5bff;
    font-weight:800;
    margin-top:12px;
    font-size:1.1rem;
}

.line{
    width:80%;
    height:4px;
    background:#111;
    margin:20px auto;
}

.desc{
    color:#222;
    line-height:1.6;
    font-size:1rem;
}

.link{
    display:block;
    text-decoration:none;
    text-align:center;
    background:#eeff00;
    color:#111;
    font-size:1.4rem;
    font-weight:800;
    border:5px solid #111;
    border-radius:22px;
    box-shadow:8px 8px 0 #111;
    padding:22px;
    margin-bottom:22px;
    transition:.15s;
}

.link:hover{
    transform:translate(4px,4px);
    box-shadow:4px 4px 0 #111;
}

.footer{
    text-align:center;
    color:white;
    font-weight:700;
    margin-top:30px;
}
</style>
</head>

<div class="container">

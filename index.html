<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEANOOO - Linktree</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Space Grotesk', sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: #2D5BFF;
    /* Grid background dibuat sedikit lebih tipis agar lebih clean */
    background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 2px, transparent 2px);
    background-size: 40px 40px;
    padding: 30px 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 380px; /* Sedikit diperkecil agar lebih ramping dan pas di layar HP */
    margin: auto;
}

/* Animasi Muncul Pertama Kali (Fade In Up) */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card {
    background: #F5F5F5;
    border: 4px solid #111;
    border-radius: 24px;
    box-shadow: 8px 8px 0 #111;
    padding: 24px 16px;
    text-align: center;
    margin-bottom: 20px;
    animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}

.profile-container {
    width: 105px;
    height: 105px;
    border-radius: 50%;
    border: 4px solid #111;
    background: #2D5BFF; 
    margin: 0 auto 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Efek spin halus pada foto saat halaman pertama dimuat */
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.profile-container:hover {
    transform: scale(1.05) rotate(5deg); /* Sedikit membesar dan miring saat di-hover */
}

.profile-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

h1 {
    font-size: 2.1rem;
    font-weight: 800;
    color: #111;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.tagline {
    font-size: 0.85rem;
    font-weight: 800;
    color: #2D5BFF;
    margin-bottom: 12px;
    letter-spacing: 1px;
}

.line {
    width: 75%;
    height: 4px;
    background: #111;
    margin: 0 auto 14px;
}

.desc {
    font-size: 0.85rem;
    line-height: 1.4;
    color: #111;
    font-weight: 700;
}

.link {
    display: block;
    text-decoration: none;
    text-align: center;
    background: #EEFF00;
    color: #111;
    font-size: 1.2rem;
    font-weight: 800;
    padding: 15px;
    margin-bottom: 16px;
    border: 4px solid #111;
    border-radius: 16px;
    box-shadow: 6px 6px 0 #111;
    position: relative;
    
    /* TRANSISI SMOOTH: Kunci agar gerakan menekan tidak kaku */
    transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                box-shadow 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                background-color 0.2s ease;
}

/* Efek Hover (Saat kursor di atasnya atau saat ditahan di HP) */
.link:hover {
    background: #f6ff63; /* Warna kuningnya sedikit lebih terang saat di-hover */
    transform: translate(-2px, -2px); /* Tombol sedikit naik seolah melayang */
    box-shadow: 8px 8px 0 #111; /* Bayangan memanjang memberikan efek 3D melayang */
}

/* Efek Aktif (Pas benar-benar diklik/di-tap) */
.link:active {
    transform: translate(6px, 6px); /* Pas ditekan, tombol masuk sepenuhnya mengikuti posisi shadow */
    box-shadow: 0px 0px 0 #111; /* Bayangan hilang karena tertutup tombol */
}

/* Efek animasi masuk berurutan untuk tiap tombol link */
.link:nth-child(2) { animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s both; }
.link:nth-child(3) { animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both; }
.link:nth-child(4) { animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both; }
.link:nth-child(5) { animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.4s both; }
.link:nth-child(6) { animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s both; }

.footer {
    text-align: center;
    margin-top: 25px;
    color: white;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    animation: fadeInUp 0.5s ease 0.6s both;
}
</style>
</head>

</html>

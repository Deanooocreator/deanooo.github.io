<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEANOOO - Linktree</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Space Grotesk', sans-serif;
}

body {
    background: #2D5BFF;
    background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 2px, transparent 2px);
    background-size: 40px 40px;
    padding: 30px 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 380px;
    margin: auto;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card {
    background: #F5F5F5;
    border: 4px solid #111;
    border-radius: 24px;
    box-shadow: 8px 8px 0 #111;
    padding: 24px 16px;
    text-align: center;
    margin-bottom: 20px;
    animation: fadeInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15) both;
}

.profile-container {
    width: 105px;
    height: 105px;
    border-radius: 50%;
    border: 4px solid #111;
    background: #2D5BFF; 
    margin: 0 auto 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
}

.profile-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

h1 {
    font-size: 2.1rem;
    font-weight: 800;
    color: #111;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.tagline {
    font-size: 0.85rem;
    font-weight: 800;
    color: #2D5BFF;
    margin-bottom: 12px;
    letter-spacing: 1px;
}

.line {
    width: 75%;
    height: 4px;
    background: #111;
    margin: 0 auto 14px;
}

.desc {
    font-size: 0.85rem;
    line-height: 1.4;
    color: #111;
    font-weight: 700;
}

.link {
    display: block;
    text-decoration: none;
    text-align: center;
    background: #EEFF00;
    color: #111;
    font-size: 1.2rem;
    font-weight: 800;
    padding: 15px;
    margin-bottom: 16px;
    border: 4px solid #111;
    border-radius: 16px;
    box-shadow: 6px 6px 0 #111;
    position: relative;
    
    /* 1. KUNCI UTAMA: Menghilangkan kotak hitam/abu bawaan browser HP saat di-tap */
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    
    /* Transisi yang lebih pendek agar tidak terasa delay saat berpindah halaman */
    transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.1s ease;
}

/* Efek Hover untuk Laptop/Desktop */
@media (hover: hover) {
    .link:hover {
        background: #f6ff63;
        transform: translate(-2px, -2px);
        box-shadow: 8px 8px 0 #111;
    }
}

/* Efek Aktif saat benar-benar di-tap/klik (Fokus pada transisi yang clean) */
.link:active {
    transform: translate(4px, 4px) !important;
    box-shadow: 2px 2px 0 #111 !important;
    background: #d8e600;
}

/* Efek animasi muncul berurutan */
.link:nth-child(2) { animation: fadeInUp 0.4s ease 0.05s both; }
.link:nth-child(3) { animation: fadeInUp 0.4s ease 0.1s both; }
.link:nth-child(4) { animation: fadeInUp 0.4s ease 0.15s both; }
.link:nth-child(5) { animation: fadeInUp 0.4s ease 0.2s both; }
.link:nth-child(6) { animation: fadeInUp 0.4s ease 0.25s both; }

.footer {
    text-align: center;
    margin-top: 25px;
    color: white;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    animation: fadeInUp 0.4s ease 0.3s both;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <div class="profile-container">
            <img src="lv_0_20260605163847.jpg" alt="DEANOOO">
        </div>
        
        <h1>DEANOOO</h1>
        <div class="tagline">PLAY • CREATE • WIN</div>
        <div class="line"></div>
        <div class="desc">Gaming Content • Community • Entertainment</div>
    </div>

    <a class="link" href="https://www.tiktok.com/@deaaanoo?_r=1&_t=ZS-96xIgVcq5ln" target="_blank">TikTok</a>
    <a class="link" href="https://youtube.com/@deaanooo?si=W_JEmHk3qRwxwDER" target="_blank">YouTube</a>
    <a class="link" href="https://www.facebook.com/share/1CcjwmUfjn/" target="_blank">Facebook</a>
    <a class="link" href="https://sociabuzz.com/deanooo/tribe" target="_blank">Sociabuzz Tribe</a>
    <a class="link" href="https://saweria.co/BLIICO" target="_blank">Saweria</a>

    <div class="footer">
        © DEANOOO
    </div>

</div>

</body>
</html>

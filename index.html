<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEANOOO - Linktree</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Space Grotesk', sans-serif;
}

body {
    background: #2D5BFF;
    background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 2px, transparent 2px);
    background-size: 40px 40px;
    padding: 20px 18px; /* Padding dikurangi agar konten lebih naik */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 380px;
    margin: auto;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* REVISI: Ukuran card putih diperkecil (padding dikurangi) */
.card {
    background: #F5F5F5;
    border: 4px solid #111;
    border-radius: 24px;
    box-shadow: 8px 8px 0 #111;
    padding: 16px 16px; /* Diperkecil dari 24px ke 16px */
    text-align: center;
    margin-bottom: 16px; /* Jarak ke tombol dikurangi */
    animation: fadeInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15) both;
}

/* REVISI: Ukuran foto profil sedikit dikecilkan agar pas */
.profile-container {
    width: 95px; 
    height: 95px;
    border-radius: 50%;
    border: 4px solid #111;
    background: #2D5BFF; 
    margin: 0 auto 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
}

.profile-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* REVISI: font h1 diperkecil sedikit */
h1 {
    font-size: 1.9rem; 
    font-weight: 800;
    color: #111;
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.tagline {
    font-size: 0.8rem;
    font-weight: 800;
    color: #2D5BFF;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

.line {
    width: 75%;
    height: 4px;
    background: #111;
    margin: 0 auto 10px;
}

.desc {
    font-size: 0.8rem;
    line-height: 1.4;
    color: #111;
    font-weight: 700;
}

/* Base style untuk semua link */
.link {
    display: block;
    text-decoration: none;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 800;
    padding: 14px; /* Dikecilkan sedikit dari 15px agar pas di layar */
    margin-bottom: 14px;
    border: 4px solid #111;
    border-radius: 16px;
    box-shadow: 6px 6px 0 #111;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.1s ease;
}

/* PALET WARNA TOMBOL */

/* Instagram Baru - Pink keunguan Neobrutalism (Teks Hitam) */
.link-ig {
    background: #FF00AF;
    color: #111111;
}

/* TikTok - Hitam (Teks Putih) */
.link-tiktok {
    background: #111111;
    color: #FFFFFF;
}

/* YouTube - Merah */
.link-youtube {
    background: #FF3333;
    color: #111111;
}

/* Facebook - Biru */
.link-facebook {
    background: #3399FF;
    color: #111111;
}

/* Sociabuzz - Hijau */
.link-sociabuzz {
    background: #00FF66;
    color: #111111;
}

/* Saweria - Kuning */
.link-saweria {
    background: #FFFF00;
    color: #111111;
}

/* INTERAKSI & ANIMASI */
@media (hover: hover) {
    .link:hover {
        transform: translate(-2px, -2px);
        box-shadow: 8px 8px 0 #111;
    }
    .link-ig:hover { background: #ff33c1; }
    .link-tiktok:hover { background: #222222; }
    .link-youtube:hover { background: #ff4d4d; }
    .link-facebook:hover { background: #4da6ff; }
    .link-sociabuzz:hover { background: #1eff76; }
    .link-saweria:hover { background: #fff71a; }
}

.link:active {
    transform: translate(4px, 4px) !important;
    box-shadow: 2px 2px 0 #111 !important;
}

/* Animasi Masuk Berurutan */
.link:nth-child(2) { animation: fadeInUp 0.4s ease 0.05s both; }
.link:nth-child(3) { animation: fadeInUp 0.4s ease 0.1s both; }
.link:nth-child(4) { animation: fadeInUp 0.4s ease 0.15s both; }
.link:nth-child(5) { animation: fadeInUp 0.4s ease 0.2s both; }
.link:nth-child(6) { animation: fadeInUp 0.4s ease 0.25s both; }
.link:nth-child(7) { animation: fadeInUp 0.4s ease 0.3s both; }

.footer {
    text-align: center;
    margin-top: 20px;
    color: white;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    animation: fadeInUp 0.4s ease 0.35s both;
}
</style>
</head>

<body>

<div class="container">

    <!-- Card Profil Utama (Ukurannya sudah dikecilkan agar pas) -->
    <div class="card">
        <div class="profile-container">
            <img src="lv_0_20260605163847.jpg" alt="DEANOOO">
        </div>
        
        <h1>DEANOOO</h1>
        <div class="tagline">PLAY • CREATE • WIN</div>
        <div class="line"></div>
        <div class="desc">Gaming Content • Community • Entertainment</div>
    </div>

    <!-- Tombol Baru: Instagram diletakkan sebelum TikTok -->
    <a class="link link-ig" href="https://www.instagram.com/deano.ofc?igsh=OXVsMG15amVjMGJh" target="_blank">Instagram</a>

    <a class="link link-tiktok" href="https://www.tiktok.com/@deaaanoo?_r=1&_t=ZS-96xIgVcq5ln" target="_blank">TikTok</a>
    
    <a class="link link-youtube" href="https://youtube.com/@deaanooo?si=W_JEmHk3qRwxwDER" target="_blank">YouTube</a>
    
    <a class="link link-facebook" href="https://www.facebook.com/share/1CcjwmUfjn/" target="_blank">Facebook</a>
    
    <a class="link link-sociabuzz" href="https://sociabuzz.com/deanooo/tribe" target="_blank">Sociabuzz Tribe</a>
    
    <a class="link link-saweria" href="https://saweria.co/BLIICO" target="_blank">Saweria</a>

    <!-- Footer -->
    <div class="footer">
        © DEANOOO
    </div>

</div>

</body>
</html>
